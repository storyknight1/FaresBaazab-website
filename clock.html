<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Timezone Digital Clock</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 1200px;
  }

  .header {
    text-align: center;
    color: white;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
  }

  .header p {
    font-size: 1rem;
    opacity: 0.9;
  }

  .clocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }

  .clock-card {
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    text-align: center;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .clock-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
  }

  .timezone-label {
    font-size: 0.9rem;
    color: #667eea;
    font-weight: 600;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .city-name {
    font-size: 1.5rem;
    color: #333;
    margin-bottom: 15px;
    font-weight: 700;
  }

  .digital-time {
    font-family: 'Courier New', monospace;
    font-size: 3rem;
    color: #667eea;
    font-weight: bold;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    letter-spacing: 2px;
  }

  .date-info {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 10px;
  }

  .am-pm {
    font-size: 1.2rem;
    color: #764ba2;
    font-weight: 600;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 30px;
  }

  button {
    background: white;
    color: #667eea;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
  }

  button:hover {
    background: #667eea;
    color: white;
    transform: translateY(-2px);
  }

  button:active {
    transform: translateY(0);
  }

  .format-toggle {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .format-btn {
    padding: 8px 20px;
    font-size: 0.9rem;
    background: rgba(255, 255, 255, 0.3);
    color: white;
    border: 2px solid white;
  }

  .format-btn.active {
    background: white;
    color: #667eea;
  }

  .footer {
    text-align: center;
    color: white;
    margin-top: 40px;
    font-size: 0.9rem;
    opacity: 0.8;
  }

  @media (max-width: 768px) {
    .header h1 {
      font-size: 1.8rem;
    }

    .digital-time {
      font-size: 2rem;
    }

    .clocks-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Animation for clock update */
  @keyframes pulse {
    0% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
    100% {
      opacity: 1;
    }
  }

  .updating {
    animation: pulse 0.3s ease-in-out;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>⏰ Multi-Timezone Clock</h1>
    <p>Real-time display of current time across the globe</p>
  </div>

  <div class="format-toggle">
    <button class="format-btn active" onclick="setFormat(12)">12-Hour</button>
    <button class="format-btn" onclick="setFormat(24)">24-Hour</button>
  </div>

  <div class="clocks-grid" id="clocksGrid"></div>

  <div class="controls">
    <button onclick="addClock()">+ Add Timezone</button>
    <button onclick="resetClocks()">Reset to Default</button>
    <button onclick="toggleUpdate()">Pause/Resume</button>
  </div>

  <div class="footer">
    <p>Times are updated every second • Times displayed in local timezone format</p>
  </div>
</div>

<script>
  const timezones = [
    { city: 'New York', tz: 'America/New_York', offset: -5 },
    { city: 'London', tz: 'Europe/London', offset: 0 },
    { city: 'Tokyo', tz: 'Asia/Tokyo', offset: 9 },
    { city: 'Dubai', tz: 'Asia/Dubai', offset: 4 },
    { city: 'Sydney', tz: 'Australia/Sydney', offset: 10 },
    { city: 'Paris', tz: 'Europe/Paris', offset: 1 },
  ];

  let selectedTimezones = [...timezones];
  let timeFormat = 12;
  let isUpdating = true;

  function setFormat(format) {
    timeFormat = format;
    document.querySelectorAll('.format-btn').forEach(btn => {
      btn.classList.remove('active');
    });
    event.target.classList.add('active');
    updateAllClocks();
  }

  function getTimeInTimezone(timezone) {
    const formatter = new Intl.DateTimeFormat('en-US', {
      timeZone: timezone,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: timeFormat === 12,
      weekday: 'short',
      year: 'numeric',
      month: 'short',
      day: 'numeric',
    });

    return formatter.format(new Date());
  }

  function formatTime(dateString) {
    const parts = dateString.split(', ');
    const datePart = parts[0]; // "Mon, Jan 1, 2024"
    const timePart = parts[1]; // "12:30:45 AM" or "12:30:45"
    
    return { date: datePart, time: timePart };
  }

  function createClockCard(timezone) {
    const { date, time } = formatTime(getTimeInTimezone(timezone.tz));
    
    return `
      <div class="clock-card">
        <div class="timezone-label">${timezone.tz}</div>
        <div class="city-name">${timezone.city}</div>
        <div class="digital-time">${time.split(' ')[0]}</div>
        <div class="date-info">${date}</div>
        <div class="am-pm">${time.includes('AM') || time.includes('PM') ? time.split(' ')[1] : 'UTC' + (timezone.offset >= 0 ? '+' : '') + timezone.offset}</div>
        <button onclick="removeClock('${timezone.city}')" style="margin-top: 15px; padding: 8px 15px; font-size: 0.8rem; background: #ff6b6b; color: white;">Remove</button>
      </div>
    `;
  }

  function renderClocks() {
    const grid = document.getElementById('clocksGrid');
    grid.innerHTML = selectedTimezones.map(tz => createClockCard(tz)).join('');
  }

  function updateAllClocks() {
    if (!isUpdating) return;
    renderClocks();
  }

  function addClock() {
    const allTimezones = [
      { city: 'Los Angeles', tz: 'America/Los_Angeles', offset: -8 },
      { city: 'Chicago', tz: 'America/Chicago', offset: -6 },
      { city: 'Mexico City', tz: 'America/Mexico_City', offset: -6 },
      { city: 'Toronto', tz: 'America/Toronto', offset: -5 },
      { city: 'São Paulo', tz: 'America/Sao_Paulo', offset: -3 },
      { city: 'Berlin', tz: 'Europe/Berlin', offset: 1 },
      { city: 'Moscow', tz: 'Europe/Moscow', offset: 3 },
      { city: 'Dubai', tz: 'Asia/Dubai', offset: 4 },
      { city: 'Mumbai', tz: 'Asia/Kolkata', offset: 5.5 },
      { city: 'Bangkok', tz: 'Asia/Bangkok', offset: 7 },
      { city: 'Hong Kong', tz: 'Asia/Hong_Kong', offset: 8 },
      { city: 'Singapore', tz: 'Asia/Singapore', offset: 8 },
      { city: 'Tokyo', tz: 'Asia/Tokyo', offset: 9 },
      { city: 'Seoul', tz: 'Asia/Seoul', offset: 9 },
      { city: 'Sydney', tz: 'Australia/Sydney', offset: 10 },
      { city: 'Auckland', tz: 'Pacific/Auckland', offset: 12 },
    ];

    const available = allTimezones.filter(tz => !selectedTimezones.find(st => st.city === tz.city));
    
    if (available.length > 0) {
      const random = available[Math.floor(Math.random() * available.length)];
      selectedTimezones.push(random);
      updateAllClocks();
    } else {
      alert('All major timezones are already added!');
    }
  }

  function removeClock(city) {
    selectedTimezones = selectedTimezones.filter(tz => tz.city !== city);
    updateAllClocks();
  }

  function resetClocks() {
    selectedTimezones = [...timezones];
    updateAllClocks();
  }

  function toggleUpdate() {
    isUpdating = !isUpdating;
    if (isUpdating) {
      updateAllClocks();
    }
  }

  // Initial render
  renderClocks();

  // Update every second
  setInterval(updateAllClocks, 1000);
</script>

</body>
</html>
